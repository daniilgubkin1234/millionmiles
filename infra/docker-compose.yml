version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: encar_db
    environment:
      POSTGRES_DB: encar
      POSTGRES_USER: encar
      POSTGRES_PASSWORD: encar
    ports:
      - "5432:5432"
    volumes:
      - encar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encar -d encar"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
    container_name: encar_backend
    env_file:
      - ../backend/.env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"

  scheduler:
    build:
      context: ../backend
    container_name: encar_scheduler
    env_file:
      - ../backend/.env.example
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m app.scheduler"

  frontend:
    build:
      context: ../frontend
    container_name: encar_frontend
    env_file:
      - ../frontend/.env.example
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  encar_pg_data:
